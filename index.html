<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kraepelin Test Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Kraepelin Test</h1>

  <!-- INTRO -->
  <div id="intro">
    <p>
      Tambahkan angka dan masukkan angka satuan.<br>
      Tekan <b>ENTER</b> untuk lanjut.
    </p>
    <button onclick="startTest()">Mulai</button>
  </div>

  <!-- TEST AREA -->
  <div id="testArea" style="display:none;">
    
    <div class="question">
      <span id="top">0</span>
      <span>+</span>
      <span id="bottom">0</span>
    </div>

    <!-- INPUT FIX -->
    <input 
      id="answer" 
      maxlength="1" 
      inputmode="numeric" 
      autocomplete="off"
      autofocus
    >

    <div class="info">
      Soal ke: <span id="count">0</span>
      | Waktu: <span id="time">0</span>s
    </div>

    <!-- CONTROL BUTTON -->
    <div style="margin-top:10px;">
      <button onclick="finishTest()">Selesai</button>
      <button onclick="resetTest()">Reset</button>
    </div>

  </div>

  <!-- RESULT -->
  <div id="resultArea" style="display:none;">
    <h2>Hasil</h2>
    <div id="result"></div>

    <br>
    <button onclick="location.reload()">Ulangi Tes</button>
  </div>

</div>

<script src="script.js"></script>

<script>
  // tambahan kecil untuk reset manual
  function resetTest(){
    localStorage.removeItem("kraepelin_state");
    location.reload();
  }
</script>

</body>
</html>
