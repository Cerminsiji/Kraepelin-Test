<!DOCTYPE html>
<html>
<head>
  <title>Kraepelin Cognitive Analytics</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Kraepelin Analytics</h1>

  <div class="card">
    <h3>Performance</h3>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="card">
    <h3>Psychological Radar</h3>
    <canvas id="radarChart"></canvas>
  </div>

  <div class="card">
    <h3>Profil</h3>
    <div id="profile"></div>
  </div>

  <div class="card">
    <h3>Insight Psikologi</h3>
    <div id="insight"></div>
  </div>

  <div class="card">
    <h3>Metrics</h3>
    <div id="metrics"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
