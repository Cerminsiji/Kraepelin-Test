<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kraepelin Test</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>Kraepelin Test</h1>

  <div id="intro">
    <p>
      Tambahkan angka yang muncul, lalu ambil angka satuannya saja.
    </p>
    <button onclick="startTest()">Mulai Test</button>
  </div>

  <div id="testArea" style="display:none;">
    <div class="numbers">
      <div id="top-number">0</div>
      <div>+</div>
      <div id="bottom-number">0</div>
    </div>

    <div id="next-number"></div>

    <input id="answer" type="number" maxlength="1">
    <button onclick="submitAnswer()">Submit</button>

    <div class="status">
      Waktu: <span id="time">0</span>
    </div>
  </div>

  <div id="resultArea" style="display:none;">
    <h2>Hasil</h2>
    <div id="profile"></div>
    <div id="insight"></div>

    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
